spring.application.name=backend

# Server Configuration
server.port=8080

# Include exception messages in error responses
server.error.include-message=always

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/food_distribution?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.config.import=optional:file:.env.properties

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Upload directory (relative to working dir / backend root)
app.upload.dir=uploads

# Serve uploaded files as static resources
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ── Admin credentials ──────────────────────────────────────────────────────────
# Override these via .env.properties or environment variables in production
admin.id=${ADMIN_ID:superadmin}
admin.password=${ADMIN_PASSWORD:Admin@1234}

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP expiry in minutes
app.otp.expiry-minutes=10

# JWT Configuration
jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uU3lzdGVtMTIzNDU2Nzg=}
jwt.expiration-ms=86400000


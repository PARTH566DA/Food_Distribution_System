spring.application.name=backend

# Server Configuration
server.port=${PORT:8080}

# Include exception messages in error responses
server.error.include-message=always

# Application timezone (override on Render using APP_TIMEZONE if needed)
app.timezone=${APP_TIMEZONE:Asia/Kolkata}
spring.jackson.time-zone=${app.timezone}
spring.jpa.properties.hibernate.jdbc.time_zone=${app.timezone}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/food_distribution?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# IMPORTANT: Commented out for Render/Docker compatibility
# spring.config.import=optional:file:.env.properties

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Upload directory
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.storage.type=${APP_STORAGE_TYPE:local}
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.upload.allowed-types=image/jpeg,image/png,image/webp
app.upload.max-size-bytes=5242880
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:food-distribution/food-images}

# Food image validation (ML)
app.food-image-validation.enabled=${APP_FOOD_IMAGE_VALIDATION_ENABLED:true}
app.food-image-validation.fail-open=${APP_FOOD_IMAGE_VALIDATION_FAIL_OPEN:true}
app.food-image-validation.threshold=${APP_FOOD_IMAGE_VALIDATION_THRESHOLD:0.18}
app.food-image-validation.hf-url=${APP_FOOD_IMAGE_VALIDATION_HF_URL:https://api-inference.huggingface.co/models/microsoft/resnet-50}
app.food-image-validation.hf-api-token=${APP_FOOD_IMAGE_VALIDATION_HF_API_TOKEN:}

# Serve uploaded files as static resources
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Admin credentials
admin.id=${ADMIN_ID:superadmin}
admin.password=${ADMIN_PASSWORD:Admin@1234}

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP expiry in minutes
app.otp.expiry-minutes=10

